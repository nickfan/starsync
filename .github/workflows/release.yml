name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, for example v0.1.0. Leave blank to use Cargo.toml.'
        required: false
        type: string
      publish_docker:
        description: 'Publish Docker images to GHCR and Docker Hub when configured.'
        required: false
        default: true
        type: boolean
      publish_homebrew:
        description: 'Update the configured Homebrew tap when configured.'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  package:
    name: Package and release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      version_number: ${{ steps.release_meta.outputs.version_number }}
      source_url: ${{ steps.release_meta.outputs.source_url }}
      source_sha256: ${{ steps.package.outputs.source_sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq rsync

      - name: Resolve release metadata
        id: release_meta
        run: |
          set -euo pipefail
          input_version="${{ inputs.version }}"
          if [[ -n "${input_version}" ]]; then
            version="${input_version}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          fi
          version="v${version#v}"
          version_number="${version#v}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          if [[ "${version_number}" != "${cargo_version}" ]]; then
            echo "Release version ${version_number} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          source_name="starsync-${version}-vendored-source.tar.gz"
          source_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${version}/${source_name}"
          {
            echo "version=${version}"
            echo "version_number=${version_number}"
            echo "source_url=${source_url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Test
        run: cargo test --locked

      - name: Build Linux binary
        run: cargo build --release --locked

      - name: Package release artifacts
        id: package
        run: |
          set -euo pipefail
          version="${{ steps.release_meta.outputs.version }}"
          version_number="${{ steps.release_meta.outputs.version_number }}"
          mkdir -p dist
          tar -C target/release -czf "dist/starsync-${version}-x86_64-unknown-linux-gnu.tar.gz" starsync
          scripts/package-vendored-source.sh "${version_number}"
          source_archive="dist/starsync-${version}-vendored-source.tar.gz"
          source_sha256="$(shasum -a 256 "${source_archive}" | awk '{print $1}')"
          shasum -a 256 dist/*.tar.gz > dist/SHA256SUMS
          echo "source_sha256=${source_sha256}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          cat > "${notes}" <<EOF
          StarSync ${RELEASE_VERSION}

          Assets:
          - Linux x86_64 binary tarball
          - Vendored source tarball for Homebrew/Linuxbrew source builds
          - SHA256SUMS

          Container images are published by this workflow to GHCR and, when Docker Hub secrets are configured, Docker Hub.
          EOF
          if gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_VERSION}" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "${RELEASE_VERSION}" dist/*.tar.gz dist/SHA256SUMS \
              --title "StarSync ${RELEASE_VERSION}" \
              --notes-file "${notes}"
          fi

  docker:
    name: Docker images
    needs: package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.publish_docker }}

    env:
      DOCKER_PLATFORMS: ${{ vars.DOCKER_PLATFORMS || 'linux/amd64' }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.package.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ needs.package.outputs.version_number }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.package.outputs.version }}
            org.opencontainers.image.description=Local-first GitHub starred repository knowledge sync

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Publish Docker Hub image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/starsync:${{ needs.package.outputs.version }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/starsync:${{ needs.package.outputs.version_number }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/starsync:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.package.outputs.version }}
            org.opencontainers.image.description=Local-first GitHub starred repository knowledge sync

  homebrew:
    name: Homebrew tap
    needs: package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.publish_homebrew }}

    env:
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || secrets.HOMEBREW_TAP_REPO }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when tap secrets are missing
        if: env.HOMEBREW_TAP_REPO == '' || env.HOMEBREW_TAP_TOKEN == ''
        run: echo "HOMEBREW_TAP_REPO/HOMEBREW_TAP_TOKEN not configured; skipping tap update."

      - name: Update tap formula
        if: env.HOMEBREW_TAP_REPO != '' && env.HOMEBREW_TAP_TOKEN != ''
        env:
          RELEASE_VERSION: ${{ needs.package.outputs.version }}
          RELEASE_VERSION_NUMBER: ${{ needs.package.outputs.version_number }}
          SOURCE_URL: ${{ needs.package.outputs.source_url }}
          SOURCE_SHA256: ${{ needs.package.outputs.source_sha256 }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" homebrew-tap
          scripts/generate-homebrew-formula.sh \
            "${RELEASE_VERSION_NUMBER}" \
            "${SOURCE_URL}" \
            "${SOURCE_SHA256}" \
            homebrew-tap/Formula/starsync.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/starsync.rb
          if git diff --cached --quiet -- Formula/starsync.rb; then
            echo "Formula is already up to date."
            exit 0
          fi
          git commit -m "starsync ${RELEASE_VERSION}"
          git push
