              volumeMounts:
                - name: data
                  mountPath: {{ .Values.config.dataDir }}
                - name: state
                  mountPath: {{ .Values.config.stateDir }}
                - name: index
                  mountPath: {{ .Values.config.searchIndexDir }}
                - name: ui
                  mountPath: {{ .Values.config.uiDir }}
          volumes:
            - name: data
              {{- if .Values.persistence.data.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "starsync.fullname" . }}-data
              {{- else }}
              emptyDir: {}
              {{- end }}
            - name: state
              {{- if .Values.persistence.state.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "starsync.fullname" . }}-state
              {{- else }}
              emptyDir: {}
              {{- end }}
            - name: index
              {{- if .Values.persistence.index.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "starsync.fullname" . }}-index
              {{- else }}
              emptyDir: {}
              {{- end }}
            - name: ui
              {{- if .Values.persistence.ui.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "starsync.fullname" . }}-ui
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}
