apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "starsync.fullname" . }}
  labels:
    {{- include "starsync.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "starsync.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "starsync.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "starsync.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: starsync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8989
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "starsync.fullname" . }}-config
            {{- if or .Values.secret.existingSecret .Values.secret.githubToken }}
            - secretRef:
                name: {{ include "starsync.secretName" . }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            - name: state
              mountPath: {{ .Values.config.stateDir }}
            - name: index
              mountPath: {{ .Values.config.searchIndexDir }}
            - name: ui
              mountPath: {{ .Values.config.uiDir }}
      volumes:
        - name: data
          {{- if .Values.persistence.data.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "starsync.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: state
          {{- if .Values.persistence.state.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "starsync.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: index
          {{- if .Values.persistence.index.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "starsync.fullname" . }}-index
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: ui
          {{- if .Values.persistence.ui.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "starsync.fullname" . }}-ui
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
